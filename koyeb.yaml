name: neon-rubi-agent
services:
  - name: web
    type: web
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
    env:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: AUTH_SECRET
        value: change-this
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: change-me
      - key: ADMIN_TOKEN
        value: change-me
    build:
      type: docker
      dockerfile: Dockerfile
