name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            README.md
            DEPLOY.md
            docs/QUICKSTART.md
