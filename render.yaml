services:
  - type: web
    name: neon-rubi-agent
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
